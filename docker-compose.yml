services:
  app-db:
    image: postgres:16.2
    environment:
      POSTGRES_DB: innocode
      POSTGRES_USER: innocode
      POSTGRES_PASSWORD: innocode
    ports:
      - "5433:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innocode -d innocode"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  piston:
    image: ghcr.io/engineer-man/piston
    ports:
      - "2000:2000"
    volumes:
      - ./.docker-cache/piston-packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec
    privileged: true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:2000/api/v2/runtimes',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Installs a broad set of popular language runtimes into Piston, in the
  # background — web does NOT wait on this (installing ~18 runtimes takes a
  # while). Languages appear in the teacher's selector as each finishes.
  piston-init:
    image: node:20-bookworm-slim
    command: ["node", "/app/scripts/piston-install.mjs"]
    environment:
      PISTON_URL: "http://piston:2000"
    volumes:
      - ./scripts:/app/scripts:ro
    depends_on:
      piston:
        condition: service_healthy
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://innocode:innocode@app-db:5432/innocode?schema=public"
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
    depends_on:
      app-db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://innocode:innocode@app-db:5432/innocode?schema=public"
      PISTON_URL: "http://piston:2000"
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
    depends_on:
      migrate:
        condition: service_completed_successfully
      piston:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-db-data:
  web-node-modules:
  web-next-cache:
