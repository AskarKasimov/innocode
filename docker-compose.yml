services:
  app-db:
    image: postgres:16.2
    environment:
      POSTGRES_DB: innocode
      POSTGRES_USER: innocode
      POSTGRES_PASSWORD: innocode
    ports:
      - "5433:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innocode -d innocode"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  piston:
    image: ghcr.io/engineer-man/piston
    ports:
      - "2000:2000"
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec
    privileged: true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:2000/api/v2/runtimes',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  piston-init:
    image: curlimages/curl:8.11.0
    depends_on:
      piston:
        condition: service_healthy
    command:
      [
        "curl", "-sS", "-X", "POST", "http://piston:2000/api/v2/packages",
        "-H", "Content-Type: application/json",
        "-d", "{\"language\":\"python\",\"version\":\"3.12.0\"}",
      ]
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: innocode-app:local
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://innocode:innocode@app-db:5432/innocode?schema=public"
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
    depends_on:
      app-db:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    image: innocode-app:local
    command: ["npm", "run", "db:seed"]
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://innocode:innocode@app-db:5432/innocode?schema=public"
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: innocode-app:local
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://innocode:innocode@app-db:5432/innocode?schema=public"
      PISTON_URL: "http://piston:2000"
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
    depends_on:
      seed:
        condition: service_completed_successfully
      piston-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  app-db-data:
  piston-packages:
  web-node-modules:
  web-next-cache:
