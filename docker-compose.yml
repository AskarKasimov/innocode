services:
  app-db:
    image: postgres:16.2
    environment:
      POSTGRES_DB: innocode
      POSTGRES_USER: innocode
      POSTGRES_PASSWORD: innocode
    ports:
      - "5433:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  piston:
    image: ghcr.io/engineer-man/piston
    ports:
      - "2000:2000"
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec
    privileged: true
    restart: unless-stopped

volumes:
  app-db-data:
  piston-packages:
